features:
  basicAuth: true
  oidcAuth: true
  defaultBucket: true

image:
  tag: latest
  repository: image-registry.openshift-image-registry.svc:5000/df9936-tools
  pullPolicy: IfNotPresent

autoscaling:
  enabled: true
pdb:
  enabled: true

config:
  enabled: true
  releaseScoped: false
  configMap:
    BASICAUTH_ENABLED: "true"
    S3ACCESSMODE_ENABLED: "true"
    DB_PORT: "5432"
    KC_ENABLED: "true"
    KC_IDENTITYKEY: idir_user_guid,bceid_user_guid
    KC_PUBLICKEY: >-
      
    KC_REALM: standard
    KC_SERVERURL: "https://test.loginproxy.gov.bc.ca/auth"
    OBJECTSTORAGE_BUCKET: data-bcstats-lockbox-test-bkt
    OBJECTSTORAGE_ENDPOINT: "https://bc-stats-obj.objectstore.gov.bc.ca"
    OBJECTSTORAGE_KEY: X
    SERVER_LOGLEVEL: http
    SERVER_PORT: "3000"
    SERVER_PRIVACY_MASK: "true"
    SERVER_TEMP_EXPIRESIN: "300"

postgres:
  enabled: true
  instances:
    - name: db # do not change this name after initial install, pvc (data) and stateful sets will be deleted
      replicas: 2
      dataVolumeClaimSpec:
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: 1Gi
        storageClassName: "netapp-block-standard"
      resources:
        requests:
          cpu: 20m
          memory: 192Mi
        limits:
          cpu: 250m
          memory: 384Mi
      sidecars:
        replicaCertCopy:
          resources:
            requests:
              cpu: 25m
              memory: 50Mi

  # --------------------------------
  # --------crunchydb config: ------
  # --------------------------------

  # -------- backups ---------
  pgBackRestConfig:
    global:
      # log-level-console: debug
      # --- pvc
      repo1-retention-full: "1"
      repo1-retention-diff: "3"
    repos:
      - name: repo1
        schedules:
          full: "0 0 1 * *" # full backup at midnight every month
          differential: "0 1 * * *" # differential every day at 1am
        volume:
          volumeClaimSpec:
            accessModes:
              - "ReadWriteOnce"
            resources:
              requests:
                storage: 128Mi
            storageClassName: "netapp-file-backup"
    manual:
      repoName: repo1
      options:
        - --type=full
    repoHost:
      resources:
        requests:
          cpu: 20m
          memory: 128Mi
    sidecars:
      pgbackrest:
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
      pgbackrestConfig:
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
    jobs:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
